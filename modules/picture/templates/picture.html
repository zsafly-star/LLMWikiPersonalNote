{% extends "base.html" %}

{% block content %}
    <div class="picture-view">
        <div class="picture-container">
            <div class="picture-sidebar">
                <div class="sidebar-search-box">
                    <img src="/static/emoji/Magnifying glass tilted right_3d.png" class="emoji-icon" />
                    <input type="text" id="folder-search" placeholder="搜索..." />
                    <button class="sidebar-menu-btn" onclick="toggleSidebarMenu(event)">
                        <img src="/static/emoji/more.png" class="emoji-icon" />
                    </button>
                    <div class="sidebar-dropdown" id="sidebar-dropdown">
                        <button onclick="showNewFolderModal()"><img src="/static/emoji/File folder_3d.png" class="emoji-icon emoji-icon-sm" /> 新建文件夹</button>
                    </div>
                </div>
                <ul class="sidebar-tree picture-tree-root" id="picture-tree">
                    <div class="tree-loading">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="emoji-spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                        <span>加载中...</span>
                    </div>
                </ul>
            </div>

            <div class="picture-content">
                <div class="content-toolbar">
                    <div class="toolbar-left">
                        <div class="view-toggle">
                            <button class="view-btn active" data-view="grid" title="网格视图">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                            </button>
                            <button class="view-btn" data-view="list" title="列表视图">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/><line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/></svg>
                            </button>
                        </div>
                    </div>
                    <div class="toolbar-right">
                        <button class="toolbar-btn" id="btn-upload" style="display:none" onclick="triggerImageUpload()" title="上传图片">
                            <img src="/static/emoji/Cloud with lightning_3d.png" class="emoji-icon emoji-icon-sm" /> 上传
                        </button>
                        <div class="toolbar-more-wrap">
                            <button class="toolbar-btn toolbar-more-btn" onclick="toggleToolbarMenu(event)" title="更多">
                                <img src="/static/emoji/more.png" class="emoji-icon emoji-icon-sm" />
                            </button>
                            <div class="toolbar-dropdown" id="toolbar-dropdown">
                                <button onclick="enterSelectMode()"><img src="/static/emoji/Wastebasket_3d.png" class="emoji-icon emoji-icon-sm" /> 删除图片</button>
                            </div>
                        </div>
                        <div class="select-actions" id="select-actions" style="display:none;">
                            <label class="select-all-label">
                                <input type="checkbox" id="select-all-cb" onchange="toggleSelectAll(this.checked)"> 全选
                            </label>
                            <button class="toolbar-btn toolbar-btn-danger" onclick="confirmDeleteSelected()">
                                <img src="/static/emoji/Check mark_3d.png" class="emoji-icon emoji-icon-sm" /> 确认删除 (<span id="selected-count">0</span>)
                            </button>
                            <button class="toolbar-btn" onclick="cancelSelectMode()">取消</button>
                        </div>
                        <input type="file" id="file-upload-input" multiple accept="image/*" style="display:none;" onchange="handleImageUpload(this.files)">
                    </div>
                </div>

                <div class="image-grid-container" id="image-grid">
                    <div class="empty-state">
                        <img src="/static/emoji/picture_3d.png" class="emoji-icon emoji-icon-xl" style="margin-bottom:8px" />
                        <p>暂无图片</p>
                        <p class="empty-hint">请先在设置页面配置资源路径</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="pic-modal-overlay" id="pic-modal-overlay">
        <div class="pic-modal" id="pic-modal-content"></div>
    </div>
{% endblock %}

{% block scripts %}
    <script>
        onPageReady(function() {
            if (typeof loadPicturePage === 'function') loadPicturePage();
        });
    </script>
{% endblock %}
