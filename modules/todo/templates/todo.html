{% extends "base.html" %}

{% block content %}
    <div class="todo-view">
        <div class="view-header">
            <h2>待办事项</h2>
            <button class="btn btn-primary" onclick="addTodo()">
                <img src="/static/emoji/Plus_3d.png" class="emoji-icon emoji-icon-sm" /> 添加待办
            </button>
        </div>
        <div class="todo-container">
            <div class="empty-state">
                <img src="/static/emoji/Check mark_3d.png" class="emoji-icon emoji-icon-xl" />
                <p>暂无待办事项</p>
            </div>
        </div>
    </div>
{% endblock %}

{% block scripts %}
{% endblock %}
