{% extends "base.html" %}

{% block content %}
<div class="graph-view">
    <div class="graph-header">
        <h2>知识星链</h2>
        <div>
            <button class="btn btn-sm btn-secondary" onclick="refreshGraph()" title="刷新">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
            </button>
        </div>
    </div>
    <div class="graph-container" id="graph-container">
        <svg class="graph-canvas" id="graph-svg" width="100%" height="100%"></svg>
        <div class="graph-tooltip" id="graph-tooltip">
            <div class="graph-tooltip-title" id="tooltip-title"></div>
            <div class="graph-tooltip-desc" id="tooltip-desc"></div>
        </div>
        <div class="graph-legend">
            <div class="graph-legend-item">
                <div class="graph-legend-dot legend-concept"></div>
                <span>概念</span>
            </div>
            <div class="graph-legend-item">
                <div class="graph-legend-dot legend-query"></div>
                <span>查询</span>
            </div>
            <div class="graph-empty-msg" id="graph-empty" style="display:none;">
                暂无数据，请先编译 Wiki
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
var simulation = null;

function ensureD3(callback) {
    if (typeof d3 !== 'undefined') { callback(); return; }
    var s = document.createElement('script');
    s.src = 'https://d3js.org/d3.v7.min.js';
    s.onload = callback;
    s.onerror = function() { console.error('Failed to load D3.js'); };
    document.head.appendChild(s);
}

onPageReady(function() {
    ensureD3(function() {
        loadGraph();
        window.addEventListener('resize', function() {
            if (simulation) loadGraph();
        });
    });
});

function refreshGraph() {
    loadGraph();
}

function loadGraph() {
    fetch('/api/wiki/graph')
        .then(function(r) { return r.json(); })
        .then(function(res) {
            if (res.code === 200 && res.data) {
                renderGraph(res.data);
            }
        });
}

function renderGraph(data) {
    var container = document.getElementById('graph-container');
    if (!container) return;
    var svg = d3.select('#graph-svg');
    svg.selectAll('*').remove();

    var cs = getComputedStyle(document.documentElement);
    var clrFg = cs.getPropertyValue('--color-foreground').trim();
    var clrMuted = cs.getPropertyValue('--color-muted').trim();
    var clrBorder = cs.getPropertyValue('--color-border').trim();
    var clrSurface = cs.getPropertyValue('--color-surface').trim();

    var width = container.clientWidth;
    var height = container.clientHeight || container.parentElement.clientHeight - document.querySelector('.graph-header').clientHeight;

    if (!data.nodes || data.nodes.length === 0) {
        document.getElementById('graph-empty').style.display = 'block';
        return;
    }
    document.getElementById('graph-empty').style.display = 'none';

    svg.attr('width', width).attr('height', height);

    var clrPrimary = cs.getPropertyValue('--color-primary').trim();
    var clrAccent = cs.getPropertyValue('--color-accent').trim();

    var colorMap = {
        concept: clrPrimary || '#0D9488',
        query: clrAccent || '#F59E0B',
        entity: '#6366F1',
        overview: '#EC4899',
    };

    var sizeScale = d3.scaleLinear()
        .domain([1, d3.max(data.nodes, function(d) { return d.size || 1; })])
        .range([8, 30]);

    var nodes = data.nodes.map(function(n) {
        return {
            id: n.id,
            label: n.label,
            kind: n.kind,
            size: n.size || 1,
        };
    });

    var nodeMap = {};
    nodes.forEach(function(n) { nodeMap[n.id] = n; });

    var links = (data.edges || []).filter(function(e) {
        return nodeMap[e.source] && nodeMap[e.target];
    }).map(function(e) {
        return { source: e.source, target: e.target };
    });

    simulation = d3.forceSimulation(nodes)
        .force('link', d3.forceLink(links).id(function(d) { return d.id; }).distance(120))
        .force('charge', d3.forceManyBody().strength(-300))
        .force('center', d3.forceCenter(width / 2, height / 2))
        .force('collision', d3.forceCollide().radius(function(d) { return sizeScale(d.size) + 5; }));

    var g = svg.append('g');

    svg.call(d3.zoom()
        .scaleExtent([0.3, 3])
        .on('zoom', function(event) {
            g.attr('transform', event.transform);
        }));

    var link = g.append('g')
        .selectAll('line')
        .data(links)
        .join('line')
        .attr('stroke', clrMuted)
        .attr('stroke-width', 1.5)
        .attr('stroke-opacity', 0.6);

    var node = g.append('g')
        .selectAll('g')
        .data(nodes)
        .join('g')
        .attr('cursor', 'pointer')
        .call(d3.drag()
            .on('start', dragstarted)
            .on('drag', dragged)
            .on('end', dragended));

    node.append('circle')
        .attr('r', function(d) { return sizeScale(d.size); })
        .attr('fill', function(d) { return colorMap[d.kind] || colorMap.concept; })
        .attr('fill-opacity', 0.85)
        .attr('stroke', clrSurface)
        .attr('stroke-width', 2);

    node.append('text')
        .attr('dy', function(d) { return sizeScale(d.size) + 14; })
        .attr('text-anchor', 'middle')
        .attr('font-size', '11px')
        .attr('font-weight', '500')
        .attr('fill', clrFg)
        .text(function(d) {
            return d.label.length > 8 ? d.label.substring(0, 8) + '...' : d.label;
        });

    var tooltip = document.getElementById('graph-tooltip');

    node.on('mouseover', function(event, d) {
        document.getElementById('tooltip-title').textContent = d.label;
        document.getElementById('tooltip-desc').textContent = d.kind;
        tooltip.style.display = 'block';
        tooltip.style.left = (event.offsetX + 15) + 'px';
        tooltip.style.top = (event.offsetY - 10) + 'px';

        d3.select(this).select('circle')
            .transition().duration(200)
            .attr('r', sizeScale(d.size) * 1.3)
            .attr('fill-opacity', 1);

        link.attr('stroke', function(l) {
            return (l.source.id === d.id || l.target.id === d.id) ? colorMap[d.kind] || '#0D9488' : clrMuted;
        }).attr('stroke-width', function(l) {
            return (l.source.id === d.id || l.target.id === d.id) ? 2.5 : 1.5;
        }).attr('stroke-opacity', function(l) {
            return (l.source.id === d.id || l.target.id === d.id) ? 1 : 0.3;
        });
    })
    .on('mousemove', function(event) {
        tooltip.style.left = (event.offsetX + 15) + 'px';
        tooltip.style.top = (event.offsetY - 10) + 'px';
    })
    .on('mouseout', function(event, d) {
        tooltip.style.display = 'none';

        d3.select(this).select('circle')
            .transition().duration(200)
            .attr('r', sizeScale(d.size))
            .attr('fill-opacity', 0.85);

        link.attr('stroke', clrMuted)
            .attr('stroke-width', 1.5)
            .attr('stroke-opacity', 0.6);
    })
    .on('click', function(event, d) {
        window.location.href = '/wiki?page=' + encodeURIComponent(d.id);
    });

    simulation.on('tick', function() {
        link
            .attr('x1', function(d) { return d.source.x; })
            .attr('y1', function(d) { return d.source.y; })
            .attr('x2', function(d) { return d.target.x; })
            .attr('y2', function(d) { return d.target.y; });

        node.attr('transform', function(d) {
            return 'translate(' + d.x + ',' + d.y + ')';
        });
    });
}

function dragstarted(event, d) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x;
    d.fy = d.y;
}

function dragged(event, d) {
    d.fx = event.x;
    d.fy = event.y;
}

function dragended(event, d) {
    if (!event.active) simulation.alphaTarget(0);
    d.fx = null;
    d.fy = null;
}
</script>
{% endblock %}
